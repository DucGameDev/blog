{% load static %}<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ducdev{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Blog công nghệ bởi ducdev{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-surface text-ink min-h-screen font-body">

  <!-- NAV -->
  <header class="sticky top-0 z-50 bg-surface border-b border-border" style="height:74px;">
    <div class="max-w-7xl mx-auto px-10 h-full flex items-center justify-between">

      <a href="/" class="flex items-center gap-2 shrink-0">
        <div class="w-3 h-3 bg-accent rounded-sm"></div>
        <span class="font-heading font-bold text-2xl tracking-tight text-ink" style="letter-spacing:-0.01em;">ducdev</span>
      </a>

      <nav class="hidden md:flex items-center gap-8 font-mono text-xs uppercase tracking-widest">
        <a href="/" class="text-ink font-medium hover:text-muted-3 transition-colors">Mới nhất</a>
        {% for cat in nav_categories %}
        <a href="{% url 'posts:category' cat.slug %}" class="text-muted-3 hover:text-ink transition-colors">{{ cat.name }}</a>
        {% endfor %}
      </nav>

      <div class="flex items-center gap-5">
        <span class="font-mono text-sm text-muted-3 hidden md:block">Tìm →</span>
        <a href="/admin/" class="font-mono text-xs uppercase tracking-wider bg-ink text-surface px-4 py-2.5 rounded-sm hover:opacity-80 transition-opacity">Admin</a>
      </div>

    </div>
  </header>

  {% block content %}{% endblock %}

  <!-- FOOTER -->
  <footer class="border-t border-border mt-20">
    <div class="max-w-7xl mx-auto px-10 py-8 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 bg-accent rounded-sm"></div>
        <span class="font-heading font-bold text-lg text-ink">ducdev</span>
        <span class="font-mono text-xs text-muted-4 ml-1.5">&copy; {% now "Y" %}</span>
      </div>
      <div class="flex gap-7 font-mono text-xs uppercase tracking-wider text-muted-3">
        <span class="hover:text-ink cursor-pointer transition-colors">Giới thiệu</span>
        <span class="hover:text-ink cursor-pointer transition-colors">RSS</span>
        <span class="hover:text-ink cursor-pointer transition-colors">Liên hệ</span>
      </div>
    </div>
  </footer>

</body>
</html>
