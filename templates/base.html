{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ducdev blog{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}A developer blog by ducdev{% endblock %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

  <header class="border-b border-gray-800 py-4 px-6">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <a href="/" class="text-primary font-bold text-xl tracking-tight">ducdev<span class="text-gray-500">.blog</span></a>
      <nav class="flex gap-6 text-sm text-gray-400">
        <a href="/" class="hover:text-primary transition-colors">posts</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-gray-800 py-6 px-6 mt-16">
    <div class="max-w-3xl mx-auto text-center text-xs text-gray-600">
      &copy; {% now "Y" %} ducdev · built with Django
    </div>
  </footer>

</body>
</html>
